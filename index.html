<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>山海经·挂机物语</title>
  <meta name="description" content="山海经主题放置类RPG，收集32种神话灵兽">
  <meta name="theme-color" content="#1a1a2e">
  <link rel="stylesheet" href="css/style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div id="app">
    <div id="header">
      <h1>山海经·挂机物语</h1>
      <div class="res-bar">
        <span class="res-item" id="res-level">冒险Lv.1</span>
        <span class="res-item" id="res-gold">金币:0</span>
        <span class="res-item" id="res-soul">灵魂石:0</span>
        <span class="res-item" id="res-rope">草绳:0</span>
        <span class="res-item" id="res-stamina">⚡120</span>
        <span class="res-item" id="res-pets">宠物:0/50</span>
      </div>
    </div>

    <div id="tabs">
      <button class="tab-btn active" data-tab="battle">战斗</button>
      <button class="tab-btn" data-tab="pets">宠物</button>
      <button class="tab-btn" data-tab="formation">阵型</button>
      <button class="tab-btn" data-tab="rune">符文</button>
      <button class="tab-btn" data-tab="dungeon">副本</button>
      <button class="tab-btn" data-tab="treasure">宝物</button>
      <button class="tab-btn" data-tab="dex">图鉴</button>
      <button class="tab-btn" data-tab="shop">商店</button>
      <button class="tab-btn" data-tab="garden">灵兽园</button>
    </div>

    <div id="panel-battle" class="panel active">
      <div id="zone-selector"></div>
      <div id="speed-control" style="display:flex;align-items:center;gap:8px;padding:4px 8px;margin-bottom:4px;">
        <span style="color:#aaa;font-size:12px;">速度:</span>
        <input type="range" id="speed-slider" min="1" max="20" step="0.5" value="1" style="flex:1;accent-color:#e94560;">
        <span id="speed-display" style="color:#e94560;font-size:12px;min-width:30px;">×1</span>
      </div>
      <div id="battle-area">
        <div class="battle-side" id="enemy-side"></div>
        <div class="battle-divider">─── ⚔ VS ⚔ ───</div>
        <div class="battle-side" id="ally-side"></div>
      </div>
      <div id="battle-log"></div>
    </div>

    <div id="panel-pets" class="panel">
      <div id="pet-list"></div>
    </div>

    <div id="panel-formation" class="panel">
      <h3 style="text-align:center;margin-bottom:12px;color:#aaa;">阵型配置（前排扛伤，后排减伤30%）</h3>
      <div id="formation-grid"></div>
    </div>

    <div id="panel-rune" class="panel">
      <div id="rune-list"></div>
    </div>

    <div id="panel-dungeon" class="panel">
      <div id="dungeon-list"></div>
    </div>

    <div id="panel-treasure" class="panel">
      <div id="treasure-list"></div>
    </div>

    <div id="panel-dex" class="panel">
      <div class="dex-grid" id="dex-grid"></div>
    </div>

    <div id="panel-shop" class="panel">
      <div id="shop-list"></div>
    </div>

    <div id="panel-garden" class="panel">
      <div id="garden-list"></div>
    </div>

    <div id="reserve-bar">
      <h3>极品保留栏（离线暂存稀有遭遇，上限10）</h3>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
        <span style="color:#aaa;font-size:12px;">自动保存阈值:</span>
        <select id="reserve-threshold" style="background:#16213e;color:#ddd;border:1px solid #333;padding:2px 6px;border-radius:4px;">
          <option value="1">1星以上</option>
          <option value="2" selected>2星以上</option>
          <option value="3">仅3星</option>
        </select>
      </div>
      <div id="reserve-slots"></div>
    </div>
  </div>

  <div id="modal-root"></div>
  <div id="toast-container"></div>

  <!-- ES Module 入口 -->
  <script type="module" src="js/main.js"></script>

  <!-- PWA Service Worker 注册 -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  </script>
</body>
</html>
